services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    image: atlas-api:latest
    container_name: atlas-api
    restart: unless-stopped
    env_file:
      - api/.env
    ports:
      - "8000:8000"

  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
    image: atlas-agent:latest
    container_name: atlas-agent
    restart: unless-stopped
    env_file:
      - agent/.env
    ports:
      - "8001:8001"
