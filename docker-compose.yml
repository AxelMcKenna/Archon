services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    image: arro-api:latest
    container_name: arro-api
    restart: unless-stopped
    env_file:
      - api/.env
    ports:
      - "8000:8000"

  agent:
    build:
      context: .
      dockerfile: llm-gateway/Dockerfile
    image: arro-agent:latest
    container_name: arro-llm-gateway
    restart: unless-stopped
    env_file:
      - llm-gateway/.env
    ports:
      - "8001:8001"
