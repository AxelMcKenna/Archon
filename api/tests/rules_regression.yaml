# Rules engine regression set (FR-2.10).
# Each case: input item → expected primary category from rules engine.
# CI fails if any case stops matching.

cases:
  - id: ps1
    raw_text: "Please provide PS1 from a Chartered Professional Engineer for the proposed retaining wall."
    expected_category: documentation:producer_statements
    expected_rule: ps1-mention

  - id: ps3
    raw_text: "PS3 (Construction Review) is required prior to CCC issue."
    expected_category: documentation:producer_statements
    expected_rule: ps3-mention

  - id: e2-explicit
    raw_text: "Show flashings to head, jamb and sill at all window penetrations. Refer E2/AS1."
    expected_category: building_code:E2
    expected_rule: e2-as1

  - id: e2-keyword
    raw_text: "Show all weathertight junctions on the elevations."
    expected_category: building_code:E2
    expected_rule: weathertightness-keyword

  - id: b1-clause
    raw_text: "Provide structural calculations demonstrating compliance with Building Code clause B1."
    expected_category: building_code:B1
    expected_rule: clause-b1

  - id: nzs-3604
    raw_text: "Bracing design shall comply with NZS 3604:2011."
    expected_category: building_code:B1
    expected_rule: nzs-3604

  - id: lbp
    raw_text: "Provide LBP details for the licensed building practitioner."
    expected_category: documentation:lbp
    expected_rule: lbp-mention

  - id: fee
    raw_text: "Outstanding fee shortfall of $450 must be paid before processing continues."
    expected_category: documentation:fees
    expected_rule: fee-shortfall

  - id: drainage
    raw_text: "Provide a drainage layout including stormwater discharge point."
    expected_category: building_code:G
    expected_rule: drainage-keyword

  - id: barrier
    raw_text: "Balustrade height to deck must comply with safety glazing requirements."
    expected_category: building_code:F
    expected_rule: barrier-glazing

  - id: insulation
    raw_text: "Confirm wall insulation R-value meets H1 schedule method."
    expected_category: building_code:H1
    expected_rule: insulation-h1

  - id: fire
    raw_text: "Provide fire-rated separation between garage and habitable spaces."
    expected_category: building_code:C
    expected_rule: fire-protection

  - id: site-plan
    raw_text: "Site plan does not show north arrow or scale bar. Please amend."
    expected_category: documentation:plans
    expected_rule: site-plan-issue

  - id: specs
    raw_text: "Material specifications are missing for the cladding system. Please provide."
    expected_category: documentation:specifications
    expected_rule: specifications-issue

  # ─── v1.2.0 commercial cases ───────────────────────────────────────────────
  - id: commercial-escape-routes
    raw_text: "The occupant load and travel distance to the two required exits from Level 2 have not been demonstrated. Confirm compliance with C/AS2."
    expected_category: building_code:C:escape_routes
    expected_rule: escape-travel-distance

  - id: commercial-occupant-load
    raw_text: "Provide the design occupancy and occupant load calculation for the assembly space."
    expected_category: building_code:C:escape_routes
    expected_rule: escape-occupant-load

  - id: commercial-compartmentation-frr
    raw_text: "Provide a fire resistance rating of 60/60/60 to the inter-tenancy fire separation wall."
    expected_category: building_code:C:compartmentation
    expected_rule: fire-resistance-rating

  - id: commercial-fire-stopping
    raw_text: "Detail fire stopping to all service penetrations through the fire-rated floor."
    expected_category: building_code:C:compartmentation
    expected_rule: fire-stopping-penetration

  - id: commercial-systems-sprinkler
    raw_text: "Show the automatic sprinkler system designed to NZS 4541."
    expected_category: building_code:C:systems
    expected_rule: sprinkler-system

  - id: commercial-systems-emergency-lighting
    raw_text: "Provide emergency lighting to the escape route per F6/AS1."
    expected_category: building_code:C:systems
    expected_rule: emergency-lighting-system

  - id: commercial-feb
    raw_text: "A Fire Engineering Brief and C/VM2 fire engineering report from a suitably qualified fire engineer is required for the multi-storey building."
    expected_category: building_code:C:feb
    expected_rule: fire-engineering-brief

  - id: commercial-c-as2-reference
    raw_text: "Demonstrate the fire design complies with C/AS2 for the office building."
    expected_category: building_code:C
    expected_rule: c-as2-reference

  - id: commercial-g1-occupancy
    raw_text: "Provide the number of sanitary fixtures for the assessed occupancy of the cafe and confirm separate-sex and accessible facilities."
    expected_category: building_code:G1:commercial
    expected_rule: g1-occupancy-fixtures

  - id: commercial-g4-contaminant
    raw_text: "Confirm the kitchen extract ventilation and carpark extract are mechanically ventilated per G4.3.3."
    expected_category: building_code:G4:commercial
    expected_rule: g4-contaminant-extract

  - id: commercial-g4-air-changes
    raw_text: "Provide the ventilation rate in litres per second per person for the open-plan office."
    expected_category: building_code:G4:commercial
    expected_rule: g4-air-change-rate

  - id: commercial-b1-importance-level
    raw_text: "The building is Importance Level 3 (IL3) under AS/NZS 1170; provide specific engineering design."
    expected_category: building_code:B1:importance_level
    expected_rule: b1-importance-level

  - id: commercial-d1-accessible-parking
    raw_text: "Provide accessible parking spaces in accordance with NZS 4121."
    expected_category: building_code:D1
    expected_rule: d1-accessible-parking

  - id: commercial-specified-systems-bwof
    raw_text: "A building warrant of fitness (BWOF) and IQP details are required for the specified systems."
    expected_category: documentation:specified_systems
    expected_rule: ss-bwof-iqp
