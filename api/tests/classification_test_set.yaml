# Labelled test set for classification accuracy (AC-2a/2b/2c).
# Synthetic for MVP (real items pending OIA / partner architects).
# Each item: raw_text + ground-truth primary category + severity.
#
# Distribution roughly mirrors BRANZ findings:
#   B1 ~30%, E2 ~20%, wiki ~25%, others ~25%.

cases:
  # ─── B1 — Structure ──────────────────────────────────────────────────
  - id: b1-01
    raw_text: "Provide structural calculations demonstrating compliance with Building Code clause B1 for the proposed first-floor framing."
    expected: building_code:B1

  - id: b1-02
    raw_text: "Bracing design shall comply with NZS 3604:2011. Provide bracing line layout."
    expected: building_code:B1

  - id: b1-03
    raw_text: "Foundation design for the proposed slab requires CPEng input given soil class E."
    expected: building_code:B1

  - id: b1-04
    raw_text: "Confirm wind zone calculations and provide lateral load resistance details."
    expected: building_code:B1

  - id: b1-05
    raw_text: "Steel beam to top of garage opening: provide manufacturer certification or PS1."
    expected: building_code:B1

  - id: b1-06
    raw_text: "Seismic detailing for chimney attachment is missing — please provide."
    expected: building_code:B1

  # ─── E2 — External moisture ──────────────────────────────────────────
  - id: e2-01
    raw_text: "Show flashings to head, jamb and sill at all window penetrations. Refer E2/AS1."
    expected: building_code:E2

  - id: e2-02
    raw_text: "Provide weathertightness details at the junction between cladding and roof."
    expected: building_code:E2

  - id: e2-03
    raw_text: "Cladding fixings detail required for the proposed direct-fixed weatherboard."
    expected: building_code:E2

  - id: e2-04
    raw_text: "Show drained and ventilated cavity to all external wall framing."
    expected: building_code:E2

  - id: e2-05
    raw_text: "Head and sill flashing details for the patio doors are unclear — please amend."
    expected: building_code:E2

  # ─── Documentation ───────────────────────────────────────────────────
  - id: ps1-01
    raw_text: "Please provide PS1 from a Chartered Professional Engineer for the proposed retaining wall over 1.5m in height."
    expected: documentation:producer_statements

  - id: ps3-01
    raw_text: "PS3 (Construction Review) will be required prior to CCC issue."
    expected: documentation:producer_statements

  - id: ps4-01
    raw_text: "PS4 from the structural engineer is required upon completion of the steelwork."
    expected: documentation:producer_statements

  - id: lbp-01
    raw_text: "Provide LBP details for the licensed building practitioner undertaking the restricted building work."
    expected: documentation:lbp

  - id: fee-01
    raw_text: "Outstanding fee shortfall of $450.00 must be paid before processing continues."
    expected: documentation:fees

  - id: plans-01
    raw_text: "Site plan does not show north arrow or scale bar. Please amend and resubmit."
    expected: documentation:plans

  - id: plans-02
    raw_text: "Setback distance from the southern boundary not dimensioned on the site plan."
    expected: documentation:plans

  - id: spec-01
    raw_text: "Material specifications are missing for the cladding system. Please provide product specs."
    expected: documentation:specifications

  # ─── G — Services & facilities ───────────────────────────────────────
  - id: g-01
    raw_text: "Provide a drainage layout including stormwater discharge point and sewer connection."
    expected: building_code:G

  - id: g-02
    raw_text: "Plumbing details for the second bathroom are missing — please provide G12 compliance schedule."
    expected: building_code:G

  # ─── F — Safety of users ─────────────────────────────────────────────
  - id: f-01
    raw_text: "Balustrade height to deck must comply with safety glazing requirements per F4."
    expected: building_code:F

  - id: f-02
    raw_text: "Provide barrier details for stairs over 1m drop including handrail at 900mm."
    expected: building_code:F

  # ─── H1 — Energy efficiency ──────────────────────────────────────────
  - id: h1-01
    raw_text: "Confirm wall insulation R-value meets H1 schedule method for climate zone 6."
    expected: building_code:H1

  - id: h1-02
    raw_text: "Double glazing specification with low-e coating required for thermal performance."
    expected: building_code:H1

  # ─── C — Protection from fire ────────────────────────────────────────
  - id: c-01
    raw_text: "Provide fire-rated separation between attached garage and habitable spaces (60/60/60)."
    expected: building_code:C

  # ─── E3 — Internal moisture ──────────────────────────────────────────
  - id: e3-01
    raw_text: "Wet area waterproofing details required for the en-suite shower."
    expected: building_code:E3

  # ─── Commercial (v1.2.0) ─────────────────────────────────────────────
  - id: comm-escape-01
    raw_text: "Provide the occupant load and travel distance to the required exits from the upper floor."
    expected: building_code:C:escape_routes

  - id: comm-compartment-01
    raw_text: "Provide a fire resistance rating of 60/60/60 to the inter-tenancy fire separation."
    expected: building_code:C:compartmentation

  - id: comm-systems-01
    raw_text: "Show the automatic sprinkler system to NZS 4541 and emergency lighting to the escape route."
    expected: building_code:C:systems

  - id: comm-feb-01
    raw_text: "A Fire Engineering Brief and C/VM2 fire engineering report is required for the building."
    expected: building_code:C:feb

  - id: comm-g1-01
    raw_text: "Provide the sanitary fixtures for the assessed occupancy of the restaurant."
    expected: building_code:G1:commercial

  - id: comm-g4-01
    raw_text: "Provide the ventilation rate in litres per second per person for the open-plan office."
    expected: building_code:G4:commercial

  - id: comm-b1-il-01
    raw_text: "The building is Importance Level 3 (IL3) under AS/NZS 1170; provide specific engineering design."
    expected: building_code:B1:importance_level

  - id: comm-d1-01
    raw_text: "Provide accessible parking spaces in accordance with NZS 4121."
    expected: building_code:D1
