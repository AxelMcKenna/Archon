# VE ingestion source registry.
#
# The only file you should edit to add a new source URL. Each top-level
# key is a source_kind that matches an extractor under
# app/ingestion/extractors/. The 'test' kind exists only to exercise
# the plumbing end-to-end without touching real sources.
#
# Per-host etiquette:
#   rate_limit_seconds — minimum sleep between requests to the same host
#   user_agent          — sent on every request; override per kind if
#                          a particular host requires it
#
# Per-document:
#   source_key          — stable id; never reuse for a different doc
#   url                 — direct PDF or HTML URL
#   content_type        — optional; falls back to response Content-Type
#   bca / vendor / etc. — extractor-specific tags carried through

test:
  rate_limit_seconds: 1
  user_agent: "Atlas-VE-Ingest/0.1 (+contact: axel.mckenna7@gmail.com)"
  documents:
    - source_key: "test:smoke"
      url: "https://example.com/"
      content_type: "text/html"
      label: "Phase 1 plumbing smoke test"

mbie_acceptable_solution:
  rate_limit_seconds: 2
  user_agent: "Atlas-VE-Ingest/0.1 (+contact: axel.mckenna7@gmail.com)"
  # IMPORTANT: MBIE amendment versions change the URL path. Before the
  # first ingest run, verify each URL resolves to a current PDF (HEAD it
  # in a browser). When MBIE bumps an amendment, update the URL here —
  # content_hash dedup means we'll automatically re-extract.
  documents:
    - source_key: "mbie:e2_as1"
      url: "https://www.building.govt.nz/assets/Uploads/building-code-compliance/e-moisture/e2-external-moisture/asvm/e2-external-moisture-3rd-edition-amendment-11.pdf"
      content_type: "application/pdf"
      code_clause: "E2"
      label: "E2/AS1 — External moisture"
    - source_key: "mbie:b1_as1"
      url: "https://www.building.govt.nz/assets/Uploads/building-code-compliance/b-stability/b1-structure/asvm/b1-structure-3rd-edition-amendment-21.pdf"
      content_type: "application/pdf"
      code_clause: "B1"
      label: "B1/AS1 — Structure"
    - source_key: "mbie:b2_as1"
      url: "https://www.building.govt.nz/assets/Uploads/building-code-compliance/b-stability/b2-durability/asvm/b2-durability-3rd-edition-amendment-10.pdf"
      content_type: "application/pdf"
      code_clause: "B2"
      label: "B2/AS1 — Durability"
    - source_key: "mbie:h1_as1"
      url: "https://www.building.govt.nz/assets/Uploads/building-code-compliance/h-energy-efficiency/h1-energy-efficiency/asvm/h1-energy-efficiency-5th-edition.pdf"
      content_type: "application/pdf"
      code_clause: "H1"
      label: "H1/AS1 — Energy efficiency"
    - source_key: "mbie:f2_as1"
      url: "https://www.building.govt.nz/assets/Uploads/building-code-compliance/f-safety-of-users/f2-hazardous-building-materials/asvm/f2-hazardous-building-materials-3rd-edition.pdf"
      content_type: "application/pdf"
      code_clause: "F2"
      label: "F2/AS1 — Hazardous building materials"

council_guidance:
  rate_limit_seconds: 3
  user_agent: "Atlas-VE-Ingest/0.1 (+contact: axel.mckenna7@gmail.com)"
  # Council guidance URLs are less stable than MBIE's. The councils
  # restructure their websites periodically; if a URL 404s, search the
  # council site for the current location and update here. Each entry
  # carries a `bca` tag that propagates to ve_knowledge_base.bca_specific
  # so VE retrieval can filter recommendations by the project's council.
  documents:
    - source_key: "ccc:avoiding_rfis"
      url: "https://ccc.govt.nz/assets/Documents/Consents-and-Licences/building-consents/Avoiding-RFIs.pdf"
      content_type: "application/pdf"
      bca: "ccc"
      label: "CCC — Avoiding RFIs"
    - source_key: "sdc:residential_guidance"
      url: "https://www.selwyn.govt.nz/__data/assets/pdf_file/0007/residential-building-consent-guide.pdf"
      content_type: "application/pdf"
      bca: "sdc"
      label: "SDC — Residential building consent guide"
    - source_key: "wdc:validation_qa"
      url: "https://www.waimakariri.govt.nz/__data/assets/pdf_file/building/validation-quality-assurance.pdf"
      content_type: "application/pdf"
      bca: "wdc"
      label: "WDC — Validation Quality Assurance"

supplier_datasheet:
  rate_limit_seconds: 5
  user_agent: "Atlas-VE-Ingest/0.1 (+contact: axel.mckenna7@gmail.com)"
  # Manufacturer datasheet URLs are the least stable of the three source
  # kinds — suppliers redesign their sites frequently and rotate PDFs.
  # Verify each URL before the first ingest run. Each entry carries a
  # `vendor` tag that propagates to ve_knowledge_base via subcategory.
  documents:
    - source_key: "james_hardie:linea_weatherboard_tds"
      url: "https://www.jameshardie.co.nz/getmedia/linea-weatherboard-technical-data-sheet.pdf"
      content_type: "application/pdf"
      vendor: "james_hardie"
      label: "James Hardie — Linea Weatherboard"
    - source_key: "james_hardie:hardieplank_tds"
      url: "https://www.jameshardie.co.nz/getmedia/hardieplank-technical-data-sheet.pdf"
      content_type: "application/pdf"
      vendor: "james_hardie"
      label: "James Hardie — HardiePlank"
    - source_key: "carter_holt:lvl_specifier_guide"
      url: "https://www.chhwoodproducts.co.nz/lvl/specifier-guide.pdf"
      content_type: "application/pdf"
      vendor: "carter_holt_harvey"
      label: "Carter Holt Harvey — LVL Specifier Guide"
    - source_key: "tasman:pink_batts_product_guide"
      url: "https://www.tasmanbuildingproducts.co.nz/insulation/pink-batts-product-guide.pdf"
      content_type: "application/pdf"
      vendor: "tasman"
      label: "Tasman / Pink Batts — Product guide"
    - source_key: "resene:exterior_paint_specifier"
      url: "https://www.resene.co.nz/archspec/datasheets/exterior-paint-specifier.pdf"
      content_type: "application/pdf"
      vendor: "resene"
      label: "Resene — Exterior paint specifier"
