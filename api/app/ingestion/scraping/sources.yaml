council_guidance:
  rate_limit_seconds: 3
  user_agent: "Arro-VE-Ingest/0.1 (+contact: axel.mckenna7@gmail.com)"
  # Council guidance URLs are less stable than MBIE's. The councils
  # restructure their websites periodically; if a URL 404s, search the
  # council site for the current location and update here. Each entry
  # carries a `bca` tag that propagates to ve_knowledge_base.bca_specific
  # so VE retrieval can filter recommendations by the project's council.
  documents:
    - source_key: "ccc:avoiding_rfis"
      url: "https://ccc.govt.nz/assets/Documents/Consents-and-Licences/building-consents/Avoiding-RFIs.pdf"
      content_type: "application/pdf"
      bca: "ccc"
      label: "CCC — Avoiding RFIs"
    - source_key: "sdc:residential_guidance"
      url: "https://www.selwyn.govt.nz/__data/assets/pdf_file/0007/residential-building-consent-guide.pdf"
