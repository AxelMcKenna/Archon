# ARRO RFI classification rules
# Versioned. Changes must pass /api/tests/rules_regression.yaml before merge.

version: "1.1.0"

# ─────────────────────────────────────────────────────────────────────────────
# 1.1.0 additions: 30 new Canterbury-specific rules grounded in CCC Avoiding-RFI
# page, SDC Specific-Approvals + Requirements, WDC fact sheets, MBIE Determinations
# 2026/008 + 2026/013, MBIE BCA performance monitoring (Jun 2025).
# All v1.0 rules preserved unchanged for regression compatibility.
# ─────────────────────────────────────────────────────────────────────────────

rules:
  # ─── v1.0 (unchanged) ──────────────────────────────────────────────────────
  - id: ps1-mention
    description: "Item references PS1 producer statement"
    matcher:
      type: entity
      field: extracted.document_references
      contains: PS1
    category: documentation:producer_statements
    confidence: high
    severity_default: must_resolve
    hard_assertion: true
    example_match: "Please provide PS1 from a Chartered Professional Engineer..."
    version_introduced: "1.0.0"

  - id: ps3-mention
    description: "Item references PS3 producer statement"
    matcher:
      type: entity
      field: extracted.document_references
      contains: PS3
    category: documentation:producer_statements
    confidence: high
    severity_default: must_resolve
    hard_assertion: true
    version_introduced: "1.0.0"

  - id: ps4-mention
    description: "Item references PS4 producer statement"
    matcher:
      type: entity
      field: extracted.document_references
      contains: PS4
    category: documentation:producer_statements
    confidence: high
    severity_default: must_resolve
    hard_assertion: true
    version_introduced: "1.0.0"

  - id: clause-b1
    description: "Item explicitly references Building Code clause B1"
    matcher:
      type: entity
      field: extracted.clause_references
      contains: B1
    category: building_code:B1
    confidence: high
    severity_default: must_resolve
    hard_assertion: true
    version_introduced: "1.0.0"

  - id: clause-e2
    description: "Item explicitly references Building Code clause E2"
    matcher:
      type: entity
      field: extracted.clause_references
      contains: E2
    category: building_code:E2
    confidence: high
    severity_default: must_resolve
    hard_assertion: true
    version_introduced: "1.0.0"

  - id: weathertightness-keyword
    description: "Item mentions weathertightness terminology (E2 proxy)"
    matcher:
      type: regex
      field: raw_text
      pattern: "(?i)\\b(weathertight|weather-tight|cladding|flashing|junction|head\\s+and\\s+sill|drained\\s+and\\s+ventilated\\s+cavity|cavity\\s+batten)\\b"
    category: building_code:E2
    confidence: medium
    severity_default: must_resolve
    hard_assertion: false
    version_introduced: "1.0.0"

  - id: structural-keyword
    description: "Item mentions structural design terminology (B1 proxy)"
    matcher:
      type: regex
      field: raw_text
      pattern: "(?i)\\b(timber\\s+framing|steel\\s+beam|lateral\\s+load|wind\\s+zone|seismic|foundation\\s+design|bracing)\\b"
    category: building_code:B1
    confidence: medium
    severity_default: must_resolve
    hard_assertion: false
    version_introduced: "1.0.0"

  - id: nzs-3604
    description: "Item references NZS 3604 (timber-framed buildings)"
    matcher:
      type: entity
      field: extracted.standards_references
      contains: NZS 3604
    category: building_code:B1
    confidence: high
    severity_default: must_resolve
    hard_assertion: false
    version_introduced: "1.0.0"

  - id: e2-as1
    description: "Item references E2/AS1 (external moisture acceptable solution)"
    matcher:
      type: regex
      field: raw_text
      pattern: "(?i)E2/AS1"
    category: building_code:E2
    confidence: high
    severity_default: must_resolve
    hard_assertion: true
    version_introduced: "1.0.0"

  - id: lbp-mention
    description: "Item asks for LBP details"
    matcher:
      type: regex
      field: raw_text
      pattern: "(?i)\\b(LBP|licen[sc]ed\\s+building\\s+practitioner)\\b"
    category: documentation:lbp
    confidence: high
    severity_default: must_resolve
    hard_assertion: true
    version_introduced: "1.0.0"

  - id: fee-shortfall
    description: "Item references fee/payment shortfall"
    matcher:
      type: regex
      field: raw_text
      pattern: "(?i)\\b(fee|invoice|payment|shortfall|outstanding\\s+balance)\\b.*\\$\\d"
    category: documentation:fees
    confidence: high
    severity_default: must_resolve
    hard_assertion: true
    version_introduced: "1.0.0"

  - id: drainage-keyword
    description: "Item mentions drainage / plumbing (G clauses)"
    matcher:
      type: regex
      field: raw_text
      pattern: "(?i)\\b(drainage|stormwater|wastewater|sewer|plumbing|G12|G13)\\b"
    category: building_code:G
    confidence: medium
    severity_default: must_resolve
    hard_assertion: false
    version_introduced: "1.0.0"

  - id: barrier-glazing
    description: "Item mentions barriers, glazing, balustrades (F clauses)"
    matcher:
      type: regex
      field: raw_text
      pattern: "(?i)\\b(balustrade|barrier|glazing|safety\\s+glass|F4|F2)\\b"
    category: building_code:F
    confidence: medium
    severity_default: must_resolve
    hard_assertion: false
    version_introduced: "1.0.0"

  - id: wet-area-e3
    description: "Item mentions wet-area waterproofing (E3 proxy)"
    matcher:
      type: regex
      field: raw_text
      pattern: "(?i)\\b(wet\\s+area|waterproofing|shower\\s+lining|tanking|en[- ]?suite)\\b"
    category: building_code:E3
    confidence: medium
    severity_default: must_resolve
    hard_assertion: false
    version_introduced: "1.0.0"

  - id: insulation-h1
    description: "Item mentions insulation / energy efficiency (H1)"
    matcher:
      type: regex
      field: raw_text
      pattern: "(?i)\\b(insulation|R-value|H1|thermal|double\\s+glaz|low-e)\\b"
    category: building_code:H1
    confidence: medium
    severity_default: must_resolve
    hard_assertion: false
    version_introduced: "1.0.0"

  - id: fire-protection
    description: "Item mentions fire protection (C clauses)"
    matcher:
      type: regex
      field: raw_text
      pattern: "(?i)(\\bfire[\\s-]+rat|\\bfire[\\s-]+separation|\\bfire[\\s-]+door|\\bC/AS|\\bC1\\b|\\bC2\\b|\\bC3\\b|\\bC4\\b)"
    category: building_code:C
    confidence: medium
    severity_default: must_resolve
    hard_assertion: false
    version_introduced: "1.0.0"

  - id: site-plan-issue
    description: "Item asks for amended/clearer site plan"
    matcher:
      type: regex
      field: raw_text
      pattern: "(?i)\\b(site\\s+plan|setback|boundary\\s+distance|north\\s+arrow|scale\\s+bar)\\b"
    category: documentation:plans
    confidence: medium
    severity_default: must_resolve
    hard_assertion: false
    version_introduced: "1.0.0"

  - id: specifications-issue
    description: "Item asks for amended/clearer specifications"
    matcher:
      type: regex
      field: raw_text
      pattern: "(?i)\\b(specifications?|product\\s+spec|material\\s+spec)\\b.*\\b(missing|insufficient|incomplete|amended|provide)\\b"
    category: documentation:specifications
    confidence: medium
    severity_default: must_resolve
    hard_assertion: false
    version_introduced: "1.0.0"

  # ─── v1.1.0 additions ──────────────────────────────────────────────────────

  # Producer-statement sub-types (parallel to v1.0 generic rules — multiple hits expected)
  - id: ps1-specific
    description: "PS1 design — emit specific PS1 sub-category"
    matcher:
      type: entity
      field: extracted.document_references
      contains: PS1
    category: documentation:producer_statements:ps1
    confidence: high
    severity_default: must_resolve
    hard_assertion: false
    version_introduced: "1.1.0"

  - id: ps3-specific
    description: "PS3 construction — emit specific PS3 sub-category"
    matcher:
      type: entity
      field: extracted.document_references
      contains: PS3
    category: documentation:producer_statements:ps3
    confidence: high
    severity_default: must_resolve
    hard_assertion: false
    version_introduced: "1.1.0"

  - id: ps4-specific
    description: "PS4 construction monitoring — emit specific PS4 sub-category"
    matcher:
      type: entity
      field: extracted.document_references
      contains: PS4
    category: documentation:producer_statements:ps4
    confidence: high
    severity_default: must_resolve
    hard_assertion: false
    version_introduced: "1.1.0"

  - id: ps4-construction-monitoring
    description: "Item discusses construction monitoring schedule (PS4 trigger)"
    matcher:
      type: regex
      field: raw_text
      pattern: "(?i)(construction\\s+monitoring|schedule\\s+of\\s+construction\\s+monitoring|monitoring\\s+schedule)"
    category: documentation:producer_statements:ps4
    confidence: medium
    severity_default: must_resolve
    hard_assertion: false
    version_introduced: "1.1.0"

  # Canterbury TC zones / geotech (B1:geotech)
  - id: tc-zone
    description: "Mentions Canterbury Technical Category (TC1/TC2/TC3)"
    matcher:
      type: regex
      field: raw_text
      pattern: "(?i)\\bTC[123]\\b"
    category: building_code:B1:geotech
    confidence: high
    severity_default: must_resolve
    hard_assertion: true
    version_introduced: "1.1.0"
    example_match: "The site is in Technical Category 3 (TC3) per the MBIE Canterbury foundation guidance."

  - id: liquefaction
    description: "Liquefaction / Canterbury rebuild geotech terminology"
    matcher:
      type: regex
      field: raw_text
      pattern: "(?i)\\b(liquefaction|liquefiable|lateral\\s+spread)\\b"
    category: building_code:B1:geotech
    confidence: high
    severity_default: must_resolve
    hard_assertion: true
    version_introduced: "1.1.0"

  - id: geotech-report
    description: "Geotechnical / shallow soil investigation report"
    matcher:
      type: regex
      field: raw_text
      pattern: "(?i)\\b(geotechnical\\s+(?:report|investigation)|shallow\\s+soil\\s+investigation|scala\\s+penetrometer|ground\\s+bearing)\\b"
    category: building_code:B1:geotech
    confidence: high
    severity_default: must_resolve
    hard_assertion: true
    version_introduced: "1.1.0"

  - id: foundation-geotech-coordination
    description: "Foundation design coordination with geotech (CCC RFI pattern)"
    matcher:
      type: regex
      field: raw_text
      pattern: "(?i)foundation\\s+design.{0,40}(coordinated|comply|consistent|aligned).{0,40}geotech"
    category: building_code:B1:geotech
    confidence: high
    severity_default: must_resolve
    hard_assertion: false
    version_introduced: "1.1.0"
    notes: "CCC's most-cited residential RFI; geotech engineer must confirm in writing."

  # F9 pool barriers (split from generic F)
  - id: clause-f9
    description: "Building Code clause F9 — pool barriers"
    matcher:
      type: regex
      field: raw_text
      pattern: "(?i)\\bF9\\b"
    category: building_code:F9
    confidence: high
    severity_default: must_resolve
    hard_assertion: true
    version_introduced: "1.1.0"

  - id: f9-as1
    description: "F9/AS1 acceptable solution reference"
    matcher:
      type: regex
      field: raw_text
      pattern: "(?i)F9/AS1"
    category: building_code:F9
    confidence: high
    severity_default: must_resolve
    hard_assertion: true
    version_introduced: "1.1.0"

  - id: pool-barrier-non-climbable
    description: "Pool barrier non-climbable zone (F9 keyword)"
    matcher:
      type: regex
      field: raw_text
      pattern: "(?i)(non[- ]?climbable\\s+zone|pool\\s+barrier|pool\\s+fenc(e|ing)|child.{0,15}climb)"
    category: building_code:F9
    confidence: high
    severity_default: must_resolve
    hard_assertion: false
    version_introduced: "1.1.0"
    notes: "Source: MBIE Determination 2026/013 (SDC) — verbatim RFI pattern."

  # G clause splits
  - id: g1-sanitary
    description: "G1 sanitary facilities / toilet calculator"
    matcher:
      type: regex
      field: raw_text
      pattern: "(?i)\\b(sanitary\\s+facilit|G1/AS1|toilet\\s+calculator|number\\s+of\\s+(?:toilets|pans|basins|urinals))\\b"
    category: building_code:G1
    confidence: high
    severity_default: must_resolve
    hard_assertion: true
    version_introduced: "1.1.0"

  - id: g4-mechanical-ventilation
    description: "G4 mechanical ventilation drawings/specs"
    matcher:
      type: regex
      field: raw_text
      pattern: "(?i)\\b(mechanical\\s+ventilation|G4(?:/AS|\\.)|G4\\.3\\.3)\\b"
    category: building_code:G4
    confidence: high
    severity_default: must_resolve
    hard_assertion: true
    version_introduced: "1.1.0"

  - id: g12-water-supply
    description: "G12 water supply / backflow prevention"
    matcher:
      type: regex
      field: raw_text
      pattern: "(?i)\\b(backflow\\s+prevent|potable\\s+water|water\\s+supply|G12(?:/AS)?|hot\\s+water\\s+cylinder|safe\\s+tray)\\b"
    category: building_code:G12
    confidence: high
    severity_default: must_resolve
    hard_assertion: false
    version_introduced: "1.1.0"

  - id: g13-foul-water
    description: "G13 foul water / septic / sewer connection"
    matcher:
      type: regex
      field: raw_text
      pattern: "(?i)\\b(foul\\s+water|septic\\s+tank|effluent\\s+(?:field|disposal)|sewer\\s+connection|drainlayer|G13(?:/AS)?)\\b"
    category: building_code:G13
    confidence: high
    severity_default: must_resolve
    hard_assertion: false
    version_introduced: "1.1.0"

  # H1 sub-types
  - id: h1-envelope-300m2
    description: "H1 envelope thermal resistance for buildings >300m²"
    matcher:
      type: regex
      field: raw_text
      pattern: "(?i)(thermal\\s+resistance|envelope.{0,30}insulation|modelling\\s+method|schedule\\s+method).{0,80}(300\\s*m|>300)?"
    category: building_code:H1:envelope
    confidence: medium
    severity_default: must_resolve
    hard_assertion: false
    version_introduced: "1.1.0"

  - id: h1-3-5-lighting
    description: "H1.3.5 artificial lighting energy efficiency"
    matcher:
      type: regex
      field: raw_text
      pattern: "(?i)(H1\\.3\\.5|NZS\\s*4243|artificial\\s+lighting.{0,30}(efficien|calculation))"
    category: building_code:H1:lighting
    confidence: high
    severity_default: must_resolve
    hard_assertion: true
    version_introduced: "1.1.0"

  # D1 accessibility
  - id: d1-accessible-route
    description: "D1 accessible route / D1.3.3 isolated steps"
    matcher:
      type: regex
      field: raw_text
      pattern: "(?i)\\b(accessible\\s+route|D1/AS1|D1\\.3\\.3|isolated\\s+step|wheelchair\\s+(?:access|park)|principal\\s+access)\\b"
    category: building_code:D1
    confidence: high
    severity_default: must_resolve
    hard_assertion: true
    version_introduced: "1.1.0"

  # Site levels — Canterbury-specific datums
  - id: christchurch-drainage-datum
    description: "Christchurch Drainage Datum (CCC flood-prone areas)"
    matcher:
      type: regex
      field: raw_text
      pattern: "(?i)christchurch\\s+drainage\\s+datum"
    category: documentation:plans:site_levels
    confidence: high
    severity_default: must_resolve
    hard_assertion: true
    version_introduced: "1.1.0"

  - id: nz-vertical-datum
    description: "NZVD2016 / LVD1937 vertical datum (WDC BLC)"
    matcher:
      type: regex
      field: raw_text
      pattern: "(?i)\\b(NZVD\\s*2016|LVD\\s*1937|Lyttelton\\s+Vertical\\s+Datum)\\b"
    category: documentation:plans:site_levels
    confidence: high
    severity_default: must_resolve
    hard_assertion: true
    version_introduced: "1.1.0"

  - id: building-location-certificate
    description: "Building Location Certificate (BLC) / Setout Certificate"
    matcher:
      type: regex
      field: raw_text
      pattern: "(?i)\\b(building\\s+location\\s+certificate|BLC\\b|setout\\s+certificate|registered\\s+professional\\s+surveyor|licensed\\s+cadastral\\s+surveyor)\\b"
    category: documentation:plans:site_levels
    confidence: high
    severity_default: must_resolve
    hard_assertion: true
    version_introduced: "1.1.0"

  - id: flood-assessment-certificate
    description: "SDC Flooding Assessment Certificate (FAC) / ECan flood report"
    matcher:
      type: regex
      field: raw_text
      pattern: "(?i)\\b(flooding?\\s+assessment\\s+certificate|\\bFAC\\b|ECan\\s+flood|flood\\s+management\\s+area|plains\\s+flood\\s+management\\s+overlay)\\b"
    category: documentation:plans:site_levels
    confidence: high
    severity_default: must_resolve
    hard_assertion: true
    version_introduced: "1.1.0"

  - id: floor-level-freeboard
    description: "Finished Floor Level (FFL) / freeboard"
    matcher:
      type: regex
      field: raw_text
      pattern: "(?i)\\b(finished\\s+floor\\s+level|\\bFFL\\b|freeboard)\\b"
    category: documentation:plans:site_levels
    confidence: high
    severity_default: must_resolve
    hard_assertion: false
    version_introduced: "1.1.0"

  # Vetting / process — SDC s45 + AlphaOne
  - id: vetting-s45
    description: "Section 45 vetting / completeness check"
    matcher:
      type: regex
      field: raw_text
      pattern: "(?i)(section\\s+45|\\bs\\.?\\s?45\\b|vetting\\s+request|completeness\\s+check)"
    category: process:vetting_s45
    confidence: high
    severity_default: must_resolve
    hard_assertion: true
    version_introduced: "1.1.0"

  - id: alphaone-email-pattern
    description: "SDC AlphaOne consent email pattern (21XXXX@sdc.abcs.co.nz)"
    matcher:
      type: regex
      field: raw_text
      pattern: "(?i)\\b21\\d{4}@sdc\\.abcs\\.co\\.nz\\b"
    category: process:vetting_s45
    confidence: high
    severity_default: must_resolve
    hard_assertion: false
    version_introduced: "1.1.0"
    notes: "Strong signal that the RFI source is Selwyn District Council via AlphaOne."

  # SDC Engineering Acceptance (parallel DE process)
  - id: engineering-acceptance
    description: "SDC Development Engineering Acceptance (parallel process)"
    matcher:
      type: regex
      field: raw_text
      pattern: "(?i)\\b(engineering\\s+acceptance|development\\s+engineer(?:ing)?\\s+team|ECOP\\b|lawful\\s+outfall|service\\s+layout\\s+requirements)\\b"
    category: process:engineering_acceptance
    confidence: high
    severity_default: must_resolve
    hard_assertion: true
    version_introduced: "1.1.0"

  - id: multi-unit-residential
    description: "Multi-unit residential development trigger (SDC EA)"
    matcher:
      type: regex
      field: raw_text
      pattern: "(?i)\\b(multi[- ]unit\\s+(?:residential|commercial|industrial)|medium[- ]density\\s+housing|MRZ\\b)\\b"
    category: process:engineering_acceptance
    confidence: medium
    severity_default: must_resolve
    hard_assertion: false
    version_introduced: "1.1.0"

  # Cross-referrals
  - id: fenz-referral
    description: "FENZ Fire Engineering Unit referral (s46)"
    matcher:
      type: regex
      field: raw_text
      pattern: "(?i)\\b(FENZ|fire\\s+and\\s+emergency|fire\\s+engineering\\s+unit|FEU\\b|section\\s+46)\\b"
    category: process:cross_referrals
    confidence: high
    severity_default: nice_to_have
    hard_assertion: true
    version_introduced: "1.1.0"

  - id: heritage-nz
    description: "Heritage NZ / Rārangi Kōrero referral"
    matcher:
      type: regex
      field: raw_text
      pattern: "(?i)\\b(heritage\\s+(?:new\\s+zealand|nz)|R(?:ā|a)rangi\\s+K(?:ō|o)rero|wāhi\\s+tapu|wahi\\s+tapu)\\b"
    category: process:cross_referrals
    confidence: high
    severity_default: nice_to_have
    hard_assertion: true
    version_introduced: "1.1.0"

  - id: mbie-warning-ban
    description: "MBIE warning or ban on a product/method"
    matcher:
      type: regex
      field: raw_text
      pattern: "(?i)\\b(MBIE\\s+(?:warning|ban)|product\\s+ban|method\\s+ban)\\b"
    category: process:cross_referrals
    confidence: high
    severity_default: must_resolve
    hard_assertion: true
    version_introduced: "1.1.0"

  # Other-authority approvals (CCC + ECan + MPI)
  - id: ccc-utility-approval
    description: "CCC network utility / asset / trade-waste approval email"
    matcher:
      type: regex
      field: raw_text
      pattern: "(?i)\\b(WaterCapacity|WastewaterCapacity|Stormwater\\.Approvals|asset\\.protection|tradewaste)@ccc\\.govt\\.nz\\b"
    category: process:other_authorities
    confidence: high
    severity_default: must_resolve
    hard_assertion: true
    version_introduced: "1.1.0"

  - id: ecan-approval
    description: "Environment Canterbury (ECan) approval requirement"
    matcher:
      type: regex
      field: raw_text
      pattern: "(?i)\\b(ECan|environment\\s+canterbury)\\b.{0,40}\\b(approval|consent|permit)\\b"
    category: process:other_authorities
    confidence: high
    severity_default: must_resolve
    hard_assertion: true
    version_introduced: "1.1.0"

  - id: mpi-approval
    description: "MPI / Food & Health approvals"
    matcher:
      type: regex
      field: raw_text
      pattern: "(?i)\\b(Ministry\\s+for\\s+Primary\\s+Industries|\\bMPI\\b|food\\s+and\\s+health)\\b"
    category: process:other_authorities
    confidence: medium
    severity_default: must_resolve
    hard_assertion: false
    version_introduced: "1.1.0"

  # Change of use / unconsented work
  - id: section-40-contravention
    description: "Section 40 contravention (building work without consent)"
    matcher:
      type: regex
      field: raw_text
      pattern: "(?i)(section\\s+40|\\bs\\.?\\s?40\\b|notice\\s+to\\s+fix|\\bNTF\\b|unconsented\\s+building\\s+work|carried\\s+out\\s+without\\s+(?:building\\s+)?consent)"
    category: process:change_of_use
    confidence: high
    severity_default: must_resolve
    hard_assertion: true
    version_introduced: "1.1.0"
    notes: "Source: MBIE Determination 2026/008 (CCC NTF for sleepout)."

  - id: schedule-1-exemption
    description: "Schedule 1 exemption (often disputed for sleepouts/decks)"
    matcher:
      type: regex
      field: raw_text
      pattern: "(?i)(schedule\\s+1|exemption\\s+3B|clause\\s+3B|not\\s+more\\s+than\\s+1\\s+storey)"
    category: process:change_of_use
    confidence: high
    severity_default: must_resolve
    hard_assertion: false
    version_introduced: "1.1.0"

  - id: change-of-use-notice
    description: "Change of use notice required (Building Act)"
    matcher:
      type: regex
      field: raw_text
      pattern: "(?i)\\b(change\\s+of\\s+use|change\\s+the\\s+use\\s+of\\s+(?:a|the)\\s+building|household\\s+unit|nearly\\s+as\\s+(?:is\\s+)?reasonably\\s+practicable|ANARP)\\b"
    category: process:change_of_use
    confidence: high
    severity_default: must_resolve
    hard_assertion: true
    version_introduced: "1.1.0"

  # Certificate of Acceptance
  - id: certificate-of-acceptance
    description: "Certificate of Acceptance (Form 8 / s96)"
    matcher:
      type: regex
      field: raw_text
